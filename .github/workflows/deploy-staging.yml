# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Deploy Staging

on:
  push:
    branches:
      - staging
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      normalized_host: ${{ steps.normalize-host.outputs.normalized_host }}
      web_image: ${{ steps.images.outputs.web_image }}
      spacetime_publisher_image: ${{ steps.images.outputs.spacetime_publisher_image }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Normalize staging host
        id: normalize-host
        env:
          STAGING_HOST_RAW: ${{ secrets.STAGING_HOST }}
        run: |
          host="${STAGING_HOST_RAW}"
          host="${host#http://}"
          host="${host#https://}"
          host="${host#ws://}"
          host="${host#wss://}"
          host="${host%%/*}"
          host="${host%%:*}"

          if [ -z "$host" ]; then
            echo "STAGING_HOST must contain a valid IP or hostname." >&2
            exit 1
          fi

          echo "normalized_host=$host" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image names
        id: images
        run: |
          owner_lc="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          repo_lc="$(echo "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')"
          echo "web_image=ghcr.io/${owner_lc}/${repo_lc}-web-staging:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "spacetime_publisher_image=ghcr.io/${owner_lc}/${repo_lc}-spacetime-publisher-staging:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "web_latest=ghcr.io/${owner_lc}/${repo_lc}-web-staging:latest" >> "$GITHUB_OUTPUT"
          echo "spacetime_publisher_latest=ghcr.io/${owner_lc}/${repo_lc}-spacetime-publisher-staging:latest" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ steps.images.outputs.web_image }}
            ${{ steps.images.outputs.web_latest }}
          build-args: |
            NEXT_PUBLIC_SPACETIME_URL=ws://${{ steps.normalize-host.outputs.normalized_host }}:3000
            NEXT_PUBLIC_SPACETIME_MODULE=${{ vars.SPACETIME_MODULE_NAME || 'houseplan' }}
            NEXT_PUBLIC_LIVEKIT_URL=ws://${{ steps.normalize-host.outputs.normalized_host }}:7880
            NEXT_PUBLIC_GIPHY_API_KEY=${{ vars.NEXT_PUBLIC_GIPHY_API_KEY }}

      - name: Build and push Spacetime publisher image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/spacetime/Dockerfile.publish
          push: true
          tags: |
            ${{ steps.images.outputs.spacetime_publisher_image }}
            ${{ steps.images.outputs.spacetime_publisher_latest }}

  deploy:
    runs-on: ubuntu-latest
    needs:
      - build-and-push
    environment: staging
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate deploy SSH settings
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          DEPLOY_PORT="${DEPLOY_PORT:-22}"

          if [ -z "${DEPLOY_HOST}" ]; then
            echo "Missing required secret: DEPLOY_HOST" >&2
            exit 1
          fi

          if [ -z "${DEPLOY_USER}" ]; then
            echo "Missing required secret: DEPLOY_USER" >&2
            exit 1
          fi

          case "$DEPLOY_PORT" in
            ''|*[!0-9]*)
              echo "DEPLOY_PORT must be numeric. Current value is invalid." >&2
              exit 1
              ;;
          esac

      - name: Normalize staging host
        id: normalize-host
        env:
          STAGING_HOST_RAW: ${{ secrets.STAGING_HOST }}
        run: |
          host="${STAGING_HOST_RAW}"
          host="${host#http://}"
          host="${host#https://}"
          host="${host#ws://}"
          host="${host#wss://}"
          host="${host%%/*}"
          host="${host%%:*}"

          if [ -z "$host" ]; then
            echo "STAGING_HOST must contain a valid IP or hostname." >&2
            exit 1
          fi

          echo "normalized_host=$host" >> "$GITHUB_OUTPUT"

      - name: Configure SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          DEPLOY_SSH_PRIVATE_KEY_B64: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY_B64 }}
        run: |
          install -m 700 -d ~/.ssh

          if [ -n "${DEPLOY_SSH_PRIVATE_KEY_B64}" ]; then
            printf '%s' "${DEPLOY_SSH_PRIVATE_KEY_B64}" | base64 -d > ~/.ssh/id_ed25519
          elif [ -n "${DEPLOY_SSH_PRIVATE_KEY}" ]; then
            printf '%s' "${DEPLOY_SSH_PRIVATE_KEY}" | tr -d '\r' > ~/.ssh/id_ed25519
          else
            echo "Missing required secret: DEPLOY_SSH_PRIVATE_KEY or DEPLOY_SSH_PRIVATE_KEY_B64" >&2
            exit 1
          fi

          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -y -f ~/.ssh/id_ed25519 > /dev/null
          ssh-keyscan -p "${DEPLOY_PORT:-22}" -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Prepare staging bundle
        env:
          WEB_IMAGE: ${{ needs.build-and-push.outputs.web_image }}
          SPACETIME_PUBLISHER_IMAGE: ${{ needs.build-and-push.outputs.spacetime_publisher_image }}
          STAGING_HOST: ${{ steps.normalize-host.outputs.normalized_host }}
          SPACETIME_MODULE_NAME: ${{ vars.SPACETIME_MODULE_NAME || 'houseplan' }}
          NEXT_PUBLIC_GIPHY_API_KEY: ${{ vars.NEXT_PUBLIC_GIPHY_API_KEY }}
          LIVEKIT_API_KEY: ${{ secrets.LIVEKIT_API_KEY }}
          LIVEKIT_API_SECRET: ${{ secrets.LIVEKIT_API_SECRET }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
        run: |
          mkdir -p .deploy/infra/livekit .deploy/scripts/deploy
          cp infra/deploy/docker-compose.staging.yml .deploy/docker-compose.staging.yml
          cp scripts/deploy/remote-deploy-staging.sh .deploy/scripts/deploy/remote-deploy-staging.sh
          chmod +x .deploy/scripts/deploy/remote-deploy-staging.sh

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path
          from textwrap import dedent

          env_lines = [
              ("COMPOSE_PROJECT_NAME", "houseplan-staging"),
              ("STAGING_HOST", os.environ["STAGING_HOST"]),
              ("NEXT_PUBLIC_SPACETIME_URL", f"ws://{os.environ['STAGING_HOST']}:3000"),
              ("NEXT_PUBLIC_SPACETIME_MODULE", os.environ["SPACETIME_MODULE_NAME"]),
              ("NEXT_PUBLIC_LIVEKIT_URL", f"ws://{os.environ['STAGING_HOST']}:7880"),
              ("NEXT_PUBLIC_GIPHY_API_KEY", os.environ.get("NEXT_PUBLIC_GIPHY_API_KEY", "")),
              ("LIVEKIT_API_KEY", os.environ["LIVEKIT_API_KEY"]),
              ("LIVEKIT_API_SECRET", os.environ["LIVEKIT_API_SECRET"]),
              ("R2_ACCOUNT_ID", os.environ.get("R2_ACCOUNT_ID", "")),
              ("R2_ACCESS_KEY_ID", os.environ.get("R2_ACCESS_KEY_ID", "")),
              ("R2_SECRET_ACCESS_KEY", os.environ.get("R2_SECRET_ACCESS_KEY", "")),
              ("R2_BUCKET_NAME", os.environ.get("R2_BUCKET_NAME", "houseplan-uploads")),
              ("R2_PUBLIC_URL", os.environ.get("R2_PUBLIC_URL", "")),
              ("SPACETIME_SERVER_URL", "http://spacetimedb:3000"),
              ("SPACETIME_MODULE_NAME", os.environ["SPACETIME_MODULE_NAME"]),
              ("WEB_IMAGE", os.environ["WEB_IMAGE"]),
              ("SPACETIME_PUBLISHER_IMAGE", os.environ["SPACETIME_PUBLISHER_IMAGE"]),
              ("GHCR_USERNAME", os.environ["GHCR_USERNAME"]),
              ("GHCR_TOKEN", os.environ["GHCR_TOKEN"]),
          ]

          content = "".join(f"{key}={value}\n" for key, value in env_lines)
          Path(".deploy/.env").write_text(content, encoding="utf-8")

          livekit_api_key = json.dumps(os.environ["LIVEKIT_API_KEY"])
          livekit_api_secret = json.dumps(os.environ["LIVEKIT_API_SECRET"])
          livekit_config = dedent(
              f"""\
              port: 7880
              bind_addresses:
                - ""
              rtc:
                tcp_port: 7881
                port_range_start: 50000
                port_range_end: 50100
                use_external_ip: true
              redis:
                address: redis:6379
              keys:
                {livekit_api_key}: {livekit_api_secret}
              room:
                auto_create: true
              logging:
                level: info
              """
          )
          Path(".deploy/infra/livekit/livekit.staging.yaml").write_text(livekit_config, encoding="utf-8")
          PY

      - name: Copy staging bundle to droplet
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_ROOT: ${{ secrets.DEPLOY_ROOT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          DEPLOY_PORT="${DEPLOY_PORT:-22}"
          DEPLOY_ROOT="${DEPLOY_ROOT:-/opt/houseplan-staging}"
          SSH_TARGET="${DEPLOY_USER}@${DEPLOY_HOST}"
          ssh -p "$DEPLOY_PORT" "$SSH_TARGET" "mkdir -p '$DEPLOY_ROOT/infra/livekit' '$DEPLOY_ROOT/scripts/deploy'"
          scp -P "$DEPLOY_PORT" .deploy/docker-compose.staging.yml "$SSH_TARGET:$DEPLOY_ROOT/docker-compose.staging.yml"
          scp -P "$DEPLOY_PORT" .deploy/.env "$SSH_TARGET:$DEPLOY_ROOT/.env"
          scp -P "$DEPLOY_PORT" .deploy/infra/livekit/livekit.staging.yaml "$SSH_TARGET:$DEPLOY_ROOT/infra/livekit/livekit.staging.yaml"
          scp -P "$DEPLOY_PORT" .deploy/scripts/deploy/remote-deploy-staging.sh "$SSH_TARGET:$DEPLOY_ROOT/scripts/deploy/remote-deploy-staging.sh"

      - name: Run staging deploy
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_ROOT: ${{ secrets.DEPLOY_ROOT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          DEPLOY_PORT="${DEPLOY_PORT:-22}"
          DEPLOY_ROOT="${DEPLOY_ROOT:-/opt/houseplan-staging}"
          SSH_TARGET="${DEPLOY_USER}@${DEPLOY_HOST}"
          ssh -p "$DEPLOY_PORT" "$SSH_TARGET" "chmod +x '$DEPLOY_ROOT/scripts/deploy/remote-deploy-staging.sh' && DEPLOY_ROOT='$DEPLOY_ROOT' '$DEPLOY_ROOT/scripts/deploy/remote-deploy-staging.sh'"

      - name: Verify staging health on droplet
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_ROOT: ${{ secrets.DEPLOY_ROOT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          DEPLOY_PORT="${DEPLOY_PORT:-22}"
          DEPLOY_ROOT="${DEPLOY_ROOT:-/opt/houseplan-staging}"
          SSH_TARGET="${DEPLOY_USER}@${DEPLOY_HOST}"
          ssh -p "$DEPLOY_PORT" "$SSH_TARGET" "\
            cd '$DEPLOY_ROOT' && \
            docker compose -f docker-compose.staging.yml ps && \
            docker compose -f docker-compose.staging.yml logs --tail=120 web && \
            curl --fail --silent --show-error --retry 12 --retry-delay 5 http://127.0.0.1:3001/api/health \
          "

      - name: Verify staging health publicly
        run: curl --fail --silent --show-error --retry 10 --retry-delay 5 --retry-connrefused "http://${{ steps.normalize-host.outputs.normalized_host }}:3001/api/health"
