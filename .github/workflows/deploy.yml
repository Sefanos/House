# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      web_image: ${{ steps.images.outputs.web_image }}
      spacetime_publisher_image: ${{ steps.images.outputs.spacetime_publisher_image }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image names
        id: images
        run: |
          owner_lc="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          repo_lc="$(echo "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')"
          echo "web_image=ghcr.io/${owner_lc}/${repo_lc}-web:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "spacetime_publisher_image=ghcr.io/${owner_lc}/${repo_lc}-spacetime-publisher:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "web_latest=ghcr.io/${owner_lc}/${repo_lc}-web:latest" >> "$GITHUB_OUTPUT"
          echo "spacetime_publisher_latest=ghcr.io/${owner_lc}/${repo_lc}-spacetime-publisher:latest" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ steps.images.outputs.web_image }}
            ${{ steps.images.outputs.web_latest }}
          build-args: |
            NEXT_PUBLIC_SPACETIME_URL=wss://${{ secrets.SPACETIME_DOMAIN }}
            NEXT_PUBLIC_SPACETIME_MODULE=${{ vars.SPACETIME_MODULE_NAME || 'houseplan' }}
            NEXT_PUBLIC_LIVEKIT_URL=wss://${{ secrets.LIVEKIT_DOMAIN }}
            NEXT_PUBLIC_GIPHY_API_KEY=${{ vars.NEXT_PUBLIC_GIPHY_API_KEY }}

      - name: Build and push Spacetime publisher image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/spacetime/Dockerfile.publish
          push: true
          tags: |
            ${{ steps.images.outputs.spacetime_publisher_image }}
            ${{ steps.images.outputs.spacetime_publisher_latest }}

  deploy:
    runs-on: ubuntu-latest
    needs:
      - build-and-push
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start SSH agent
        env:
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' '${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${DEPLOY_PORT:-22}" -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Prepare deploy files
        env:
          WEB_IMAGE: ${{ needs.build-and-push.outputs.web_image }}
          SPACETIME_PUBLISHER_IMAGE: ${{ needs.build-and-push.outputs.spacetime_publisher_image }}
          SPACETIME_MODULE_NAME: ${{ vars.SPACETIME_MODULE_NAME || 'houseplan' }}
          NEXT_PUBLIC_GIPHY_API_KEY: ${{ vars.NEXT_PUBLIC_GIPHY_API_KEY }}
          APP_DOMAIN: ${{ secrets.APP_DOMAIN }}
          SPACETIME_DOMAIN: ${{ secrets.SPACETIME_DOMAIN }}
          LIVEKIT_DOMAIN: ${{ secrets.LIVEKIT_DOMAIN }}
          TRAEFIK_ACME_EMAIL: ${{ secrets.TRAEFIK_ACME_EMAIL }}
          LIVEKIT_API_KEY: ${{ secrets.LIVEKIT_API_KEY }}
          LIVEKIT_API_SECRET: ${{ secrets.LIVEKIT_API_SECRET }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
        run: |
          mkdir -p .deploy/infra/livekit .deploy/scripts/deploy .deploy/traefik
          cp infra/deploy/docker-compose.prod.yml .deploy/docker-compose.prod.yml
          cp scripts/deploy/remote-deploy.sh .deploy/scripts/deploy/remote-deploy.sh
          chmod +x .deploy/scripts/deploy/remote-deploy.sh

          python3 - <<'PY'
          import json
          import os
          from textwrap import dedent
          from pathlib import Path

          env_lines = [
              ("COMPOSE_PROJECT_NAME", "houseplan"),
              ("APP_DOMAIN", os.environ["APP_DOMAIN"]),
              ("SPACETIME_DOMAIN", os.environ["SPACETIME_DOMAIN"]),
              ("LIVEKIT_DOMAIN", os.environ["LIVEKIT_DOMAIN"]),
              ("TRAEFIK_ACME_EMAIL", os.environ["TRAEFIK_ACME_EMAIL"]),
              ("NEXT_PUBLIC_SPACETIME_URL", f"wss://{os.environ['SPACETIME_DOMAIN']}"),
              ("NEXT_PUBLIC_SPACETIME_MODULE", os.environ["SPACETIME_MODULE_NAME"]),
              ("NEXT_PUBLIC_LIVEKIT_URL", f"wss://{os.environ['LIVEKIT_DOMAIN']}"),
              ("NEXT_PUBLIC_GIPHY_API_KEY", os.environ.get("NEXT_PUBLIC_GIPHY_API_KEY", "")),
              ("LIVEKIT_API_KEY", os.environ["LIVEKIT_API_KEY"]),
              ("LIVEKIT_API_SECRET", os.environ["LIVEKIT_API_SECRET"]),
              ("R2_ACCOUNT_ID", os.environ.get("R2_ACCOUNT_ID", "")),
              ("R2_ACCESS_KEY_ID", os.environ.get("R2_ACCESS_KEY_ID", "")),
              ("R2_SECRET_ACCESS_KEY", os.environ.get("R2_SECRET_ACCESS_KEY", "")),
              ("R2_BUCKET_NAME", os.environ.get("R2_BUCKET_NAME", "houseplan-uploads")),
              ("R2_PUBLIC_URL", os.environ.get("R2_PUBLIC_URL", "")),
              ("SPACETIME_SERVER_URL", "http://spacetimedb:3000"),
              ("SPACETIME_MODULE_NAME", os.environ["SPACETIME_MODULE_NAME"]),
              ("WEB_IMAGE", os.environ["WEB_IMAGE"]),
              ("SPACETIME_PUBLISHER_IMAGE", os.environ["SPACETIME_PUBLISHER_IMAGE"]),
              ("GHCR_USERNAME", os.environ["GHCR_USERNAME"]),
              ("GHCR_TOKEN", os.environ["GHCR_TOKEN"]),
          ]

          content = "".join(f"{key}={value}\n" for key, value in env_lines)
          Path(".deploy/.env").write_text(content, encoding="utf-8")

          livekit_api_key = json.dumps(os.environ["LIVEKIT_API_KEY"])
          livekit_api_secret = json.dumps(os.environ["LIVEKIT_API_SECRET"])
          livekit_config = dedent(
              f"""\
              port: 7880
              bind_addresses:
                - ""
              rtc:
                tcp_port: 7881
                port_range_start: 50000
                port_range_end: 50100
                use_external_ip: true
              redis:
                address: redis:6379
              keys:
                {livekit_api_key}: {livekit_api_secret}
              room:
                auto_create: true
              logging:
                level: info
              """
          )
          Path(".deploy/infra/livekit/livekit.prod.yaml").write_text(livekit_config, encoding="utf-8")
          PY

      - name: Copy deploy bundle to droplet
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_ROOT: ${{ secrets.DEPLOY_ROOT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          DEPLOY_PORT="${DEPLOY_PORT:-22}"
          DEPLOY_ROOT="${DEPLOY_ROOT:-/opt/houseplan}"
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_ROOT/infra/livekit' '$DEPLOY_ROOT/scripts/deploy' '$DEPLOY_ROOT/traefik'"
          scp -P "$DEPLOY_PORT" .deploy/docker-compose.prod.yml "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_ROOT/docker-compose.prod.yml"
          scp -P "$DEPLOY_PORT" .deploy/.env "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_ROOT/.env"
          scp -P "$DEPLOY_PORT" .deploy/infra/livekit/livekit.prod.yaml "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_ROOT/infra/livekit/livekit.prod.yaml"
          scp -P "$DEPLOY_PORT" .deploy/scripts/deploy/remote-deploy.sh "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_ROOT/scripts/deploy/remote-deploy.sh"

      - name: Run remote deploy
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_ROOT: ${{ secrets.DEPLOY_ROOT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          DEPLOY_PORT="${DEPLOY_PORT:-22}"
          DEPLOY_ROOT="${DEPLOY_ROOT:-/opt/houseplan}"
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "chmod +x '$DEPLOY_ROOT/scripts/deploy/remote-deploy.sh' && DEPLOY_ROOT='$DEPLOY_ROOT' '$DEPLOY_ROOT/scripts/deploy/remote-deploy.sh'"

      - name: Verify web health
        run: curl --fail --silent --show-error --retry 10 --retry-delay 5 --retry-connrefused "https://${{ secrets.APP_DOMAIN }}/api/health"
